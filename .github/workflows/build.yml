name: Build Android APK

# Run automatically on every push and pull request to the main branches
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 21, which the project requires
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # Cache Gradle to speed up subsequent builds

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Vanilla Debug APK
        run: ./gradlew assembleVanillaDebug

      # Upload the built APK so it can be downloaded from the workflow run
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-vanilla-debug
          path: app/build/outputs/apk/vanilla/debug/*.apk
