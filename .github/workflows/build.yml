name: Build Android APK

# מגדיר שהתהליך ירוץ אוטומטית בכל דחיפה (Push) לענפים main או master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # הגדרת סביבת Java 21 שמתאימה לפרויקט שלך
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # שומר מטמון כדי להאיץ את הבניות הבאות

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # שחזור ה-keystore ופרטי החתימה מ-GitHub Secrets
      - name: Decode keystore and create signing.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"
          cat > "$GITHUB_WORKSPACE/signing.properties" <<EOF
          STORE_FILE=$GITHUB_WORKSPACE/release.keystore
          KEY_ALIAS=$KEY_ALIAS
          KEY_PASSWORD=$KEY_PASSWORD
          STORE_PASSWORD=$STORE_PASSWORD
          EOF

      # פקודת הבנייה שכבר גילינו שעובדת
      - name: Build Vanilla Release APK
        run: ./gradlew assembleVanillaRelease

      # העלאת ה-APK המוכן כדי שתוכל להוריד אותו מהאתר
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-vanilla-release
          path: app/build/outputs/apk/vanilla/release/*.apk
